name: taximate
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  kakao_map_plugin: ^0.3.2
  geolocator: ^13.0.0
  permission_handler: ^11.0.0
  url_launcher: ^6.2.5
  http: ^1.2.1
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  web_socket_channel: ^3.0.3
  flutter_local_notifications: ^17.0.0
  firebase_core: ^3.15.2
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/TaxiMate_icon.png"
  min_sdk_android: 23

